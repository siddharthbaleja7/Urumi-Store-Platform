{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.storeName }}-ingress
  namespace: {{ .Values.storeName }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
  {{- if .Values.ingress.tls.enabled }}
    - hosts:
        - {{ .Values.ingress.storefrontHost }}
        - {{ .Values.ingress.adminHost }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.storefrontHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medusa-storefront
                port:
                  number: 8000
    - host: {{ .Values.ingress.adminHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medusa-backend
                port:
                  number: 9000
{{- end }}
