apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.storeName }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: 64Mi
            cpu: 10m
          limits:
            memory: 256Mi
            cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Values.storeName }}
spec:
  ports:
  - port: 6379
  selector:
    app: redis
