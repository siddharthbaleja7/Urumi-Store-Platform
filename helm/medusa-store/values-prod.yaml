# Production (k3s VPS)
postgres:
  storageClass: "local-path"
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
backend:
  replicas: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
redis:
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
ingress:
  className: "traefik" # k3s uses traefik by default usually
  tls:
    enabled: true
    secretName: "medusa-tls-prod"
